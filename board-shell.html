<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Mergedom — Board Shell — Mockup</title>
<style>
  :root {
    --phone-w: 414px;
    --phone-h: 896px;
    --peach: #f3e4c2;
    --peach-d: #d8c290;
    --brown: #6e4a1f;
    --brown-d: #4a2a0a;
    --ink: #2a1d0f;
    --board-a: #6cc6f0;
    --board-b: #4ea7d2;
    --cell:   #8ed5f0;
    --cell-line: #6fb8d6;
    --green: #4cb944;
    --green-d: #2f8a2a;
    --red: #e64545;
    --red-d: #b22f2f;
    --gold: #f4c33b;
    --shadow: 0 8px 0 rgba(0,0,0,0.18), 0 14px 30px rgba(0,0,0,0.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(1200px 600px at 20% 0%, #1d2a44 0%, #0e1726 60%) fixed, #0e1726;
    color: #e8e8ee;
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    display: grid;
    place-items: start center;
    padding: 32px 16px;
  }

  /* ── Phone frame ──────────────────────────────────────────── */
  .phone {
    width: var(--phone-w);
    height: var(--phone-h);
    border-radius: 44px;
    background: #111;
    padding: 12px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 2px #1a1a1a inset;
    position: relative;
  }
  .screen {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 32px;
    overflow: hidden;
    background:
      /* room walls */
      linear-gradient(180deg, #cfdfe8 0%, #c1d3df 6%, #bfd1de 12%, #aac3d3 12.1%);
    display: flex;
    flex-direction: column;
  }

  /* faint room "panels" behind the HUD area */
  .room-bg {
    position: absolute;
    left: 0; right: 0; top: 0; height: 30%;
    background:
      radial-gradient(120% 70% at 50% 100%, #bfd6e1 0%, #aac3d3 70%, #92b0c2 100%);
    z-index: 0;
  }

  /* ── Top HUD strip: currencies + settings ────────────────── */
  .hud {
    position: relative; z-index: 2;
    padding: 14px 12px 4px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 6px;
    align-items: center;
  }
  .pill {
    background: #fff7e6;
    border: 2.5px solid var(--brown);
    border-radius: 999px;
    padding: 3px 10px 3px 28px;
    font-weight: 800;
    font-size: 14px;
    color: var(--ink);
    position: relative;
    box-shadow: 0 2px 0 rgba(0,0,0,.18);
    text-align: center;
  }
  .pill .badge {
    position: absolute;
    left: -6px; top: 50%;
    transform: translateY(-50%);
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 2.5px solid var(--brown);
    display: grid; place-items: center;
    font-size: 16px;
    box-shadow: 0 2px 0 rgba(0,0,0,.2);
  }
  .pill .plus {
    position: absolute;
    right: -8px; top: 50%;
    transform: translateY(-50%);
    width: 22px; height: 22px;
    border-radius: 50%;
    background: linear-gradient(180deg, #6ed664, var(--green));
    border: 2px solid var(--green-d);
    color: #fff; font-weight: 900; font-size: 16px;
    display: grid; place-items: center;
    box-shadow: 0 2px 0 rgba(0,0,0,.2);
    line-height: 0;
  }
  .pill.energy .badge { background: linear-gradient(180deg, #b4e0ff, #5fb3ff); color: #fff; }
  .pill.energy .badge::before { content: '⚡'; filter: drop-shadow(0 1px 0 #0006); }
  .pill.star   .badge { background: radial-gradient(circle at 30% 30%, #fff5b8, #ffd84a 60%, #c98a1c); color: #6a4a00; font-size: 14px; }
  .pill.star   .badge::before { content: '★'; }
  .pill.coin   .badge { background: linear-gradient(180deg, #fff0a8, #ffcd34); color: #6a4a00; }
  .pill.coin   .badge::before { content: '🏠'; font-size: 14px; }

  .pill.energy { padding-right: 22px; }
  .pill.star { padding-right: 10px; }
  .pill.coin  { padding-right: 22px; }

  .cog {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(180deg, #c8d8e6, #93afc2);
    border: 2.5px solid #4f6d80;
    color: #fff;
    display: grid; place-items: center;
    font-size: 18px;
    box-shadow: 0 3px 0 rgba(0,0,0,.25);
    cursor: pointer;
  }

  /* ── Avatars / order strip ───────────────────────────────── */
  .avatars {
    position: relative; z-index: 2;
    margin: 8px 10px 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 14px;
  }

  /* Left: cat avatar + brush task progress */
  .cat-card {
    display: flex; flex-direction: column; align-items: stretch; gap: 2px;
    position: relative;
  }
  .cat-head {
    width: 110px; height: 64px; align-self: center;
    border-radius: 50%/60% 60% 40% 40%;
    background: radial-gradient(circle at 50% 35%, #f7d8d8 0%, #efb8b8 65%, #d99090 100%);
    position: relative;
    margin-bottom: -10px;
    border: 2px solid #b06c6c;
  }
  .cat-ear {
    position: absolute; top: 6px; width: 22px; height: 22px;
    background: #efb8b8; border: 2px solid #b06c6c;
    border-radius: 50% 50% 10% 50%;
    transform: rotate(-30deg);
  }
  .cat-ear.l { left: 6px; }
  .cat-ear.r { right: 6px; transform: rotate(30deg) scaleX(-1); }
  .cat-bow {
    position: absolute; top: -6px; right: 22px;
    width: 22px; height: 14px;
    background: #ffb6c8;
    border: 2px solid #c97b94;
    border-radius: 6px;
    box-shadow: -10px 0 0 -2px #ffb6c8, -10px 0 0 0 #c97b94;
  }
  .cuc {
    position: absolute; top: 28px;
    width: 28px; height: 14px;
    background: radial-gradient(circle at 50% 50%, #d9efb1 30%, #8ec25b 100%);
    border: 2px solid #4f7a2a;
    border-radius: 50%;
  }
  .cuc.l { left: 18px; }
  .cuc.r { right: 18px; }

  .progress {
    background: linear-gradient(180deg, #c2efb6, #8fd687);
    border: 2.5px solid #2f6a2a;
    border-radius: 14px;
    padding: 4px 6px 4px 34px;
    position: relative;
    box-shadow: 0 3px 0 rgba(0,0,0,.18);
    color: #1d3a17;
    font-weight: 800; font-size: 12px;
    display: grid; gap: 2px;
  }
  .progress .brush-ico {
    position: absolute; left: -8px; top: 50%;
    transform: translateY(-50%);
    width: 32px; height: 32px;
    background: #ffe9b6;
    border: 2.5px solid #b8893c;
    border-radius: 8px;
    display: grid; place-items: center;
    font-size: 16px;
    box-shadow: 0 2px 0 rgba(0,0,0,.2);
  }
  .progress .bar {
    height: 14px; background: #e7d39a; border-radius: 8px; overflow: hidden;
    border: 1px solid #8a6e2e;
  }
  .progress .bar > span {
    display: block; height: 100%; width: 0%;
    background: linear-gradient(180deg, #ffd874, #f1a82a);
  }
  .progress .timer {
    background: #2f6a2a; color: #d6f5b8;
    border-radius: 8px;
    padding: 2px 8px;
    font-weight: 800;
    font-size: 11px;
    display: inline-flex; align-items: center; gap: 4px;
    align-self: start;
  }
  .progress .lock {
    position: absolute; right: 6px; top: 4px;
    background: #5fb3ff; border: 2px solid #1c5d99;
    width: 22px; height: 22px;
    border-radius: 6px;
    display: grid; place-items: center;
    color: #fff; font-size: 12px;
  }

  /* Center: order with bearded man + corkscrew + +2 stars */
  .order {
    position: relative;
    background: linear-gradient(180deg, #fffbe9, #f3e4c2);
    border: 2.5px solid var(--brown);
    border-radius: 18px;
    padding: 6px 10px 6px 64px;
    height: 76px;
    box-shadow: 0 3px 0 rgba(0,0,0,.2);
    display: flex; align-items: center; gap: 8px;
    overflow: visible;
  }
  .npc {
    position: absolute; left: -8px; top: 50%;
    transform: translateY(-50%);
    width: 64px; height: 78px;
    background: linear-gradient(180deg, #bfd6e1, #8aabc1);
    border: 2.5px solid #355a6f;
    border-radius: 50% 50% 18px 18px / 60% 60% 18px 18px;
    display: grid; place-items: end center;
    color: #2a3344;
    font-size: 38px; line-height: 1;
    overflow: hidden;
  }
  .npc.bearded::after { content: '🧔🏻'; font-size: 38px; margin-bottom: 4px; }
  .npc.boy-npc {
    background: linear-gradient(180deg, #efe1d2, #c79f7c);
    border-color: #6e4a1f;
  }
  .npc.boy-npc::after { content: '👦'; font-size: 38px; margin-bottom: 4px; }
  .order-slot {
    width: 50px; height: 50px;
    background: #fff7e6;
    border: 2.5px solid var(--brown);
    border-radius: 12px;
    display: grid; place-items: center;
    font-size: 26px;
    margin-left: auto;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,.1);
    position: relative;
  }
  .order-reward {
    position: absolute; top: -10px; right: 38px;
    background: linear-gradient(180deg, #fff0a8, #ffcd34);
    border: 2px solid #c98a1c;
    border-radius: 999px;
    padding: 2px 8px 2px 22px;
    font-weight: 900; font-size: 12px; color: #6a4a00;
    box-shadow: 0 2px 0 rgba(0,0,0,.2);
  }
  .order-reward::before {
    content: '★';
    position: absolute; left: -4px; top: -6px;
    width: 22px; height: 22px;
    background: radial-gradient(circle at 30% 30%, #fff5b8, #ffd84a 60%, #c98a1c);
    border: 2px solid #c98a1c;
    border-radius: 50%;
    color: #6a4a00; font-size: 14px;
    display: grid; place-items: center;
  }

  /* Right: boy avatar */
  .boy {
    width: 60px; height: 76px;
    background: linear-gradient(180deg, #efe1d2, #c79f7c);
    border: 2.5px solid #6e4a1f;
    border-radius: 50% 50% 18px 18px / 60% 60% 18px 18px;
    display: grid; place-items: end center;
    font-size: 38px;
    box-shadow: 0 3px 0 rgba(0,0,0,.2);
  }
  .boy::after { content: '👦'; margin-bottom: 4px; }

  /* ── Info banner + sell ──────────────────────────────────── */
  .banner {
    position: relative; z-index: 2;
    margin: 10px 10px 0;
  }
  .banner .info {
    background: #fff7e6;
    border: 2.5px solid var(--brown);
    border-radius: 16px;
    padding: 10px 14px 10px 50px;
    color: var(--ink);
    font-weight: 800; font-size: 14px;
    position: relative;
    box-shadow: 0 3px 0 rgba(0,0,0,.18);
    display: flex; align-items: center;
  }
  .banner .info::before {
    content: 'i';
    position: absolute; left: 8px; top: 50%;
    transform: translateY(-50%);
    width: 30px; height: 30px;
    background: linear-gradient(180deg, #6ec0ff, #2b8be6);
    border: 2px solid #155a92;
    border-radius: 50%;
    color: #fff;
    font-style: italic;
    font-weight: 900;
    display: grid; place-items: center;
    box-shadow: 0 2px 0 rgba(0,0,0,.2);
  }
  .banner .info .brush2 {
    position: absolute; left: 42px; top: 50%;
    transform: translateY(-50%);
    width: 22px; height: 22px;
    background: #ffe9b6;
    border: 2px solid #b8893c;
    border-radius: 6px;
    display: grid; place-items: center;
    font-size: 12px;
    box-shadow: 0 2px 0 rgba(0,0,0,.2);
  }
  .sell {
    background: linear-gradient(180deg, #ff6b6b, var(--red));
    border: 2.5px solid var(--red-d);
    border-radius: 16px;
    color: #fff;
    font-weight: 900;
    padding: 4px 14px;
    box-shadow: 0 3px 0 rgba(0,0,0,.2);
    display: grid; place-items: center;
    line-height: 1.1;
    text-align: center;
    min-width: 64px;
  }
  .sell .lbl { font-size: 13px; text-shadow: 0 2px 0 rgba(0,0,0,.25); }
  .sell .num {
    background: #fff;
    color: var(--red-d);
    border: 2px solid var(--red-d);
    border-radius: 999px;
    padding: 0 8px;
    font-size: 14px;
    margin-top: 2px;
    text-shadow: none;
  }

  /* ── Empty board ─────────────────────────────────────────── */
  .board-wrap {
    position: relative; z-index: 1;
    margin: 10px 10px 18px;
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
  }
  .board {
    flex: 1;
    padding: 8px;
    background: linear-gradient(180deg, var(--board-a), var(--board-b));
    border: 3px solid #2f7ba4;
    border-radius: 16px;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(9, 1fr);
    gap: 4px;
    overflow: hidden;
  }
  .cell {
    background: var(--cell);
    border: 1px solid var(--cell-line);
    border-radius: 8px;
  }

  /* ── Floor + carpet under board ──────────────────────────── */
  .floor {
    height: 60px;
    background:
      linear-gradient(180deg, #c79f7c 0%, #a87c54 100%);
    background-size: 100% 100%;
    position: relative;
    flex-shrink: 0;
    overflow: hidden;
  }
  .floor::before {
    /* wood plank lines */
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(90deg,
        rgba(0,0,0,0) 0 30px,
        rgba(0,0,0,.18) 30px 31px,
        rgba(0,0,0,0) 31px 60px);
  }
  .carpet {
    position: absolute; left: 50%; top: 4px; transform: translateX(-50%);
    width: 70%; height: 56px;
    background: radial-gradient(60% 80% at 50% 30%, #ffe7a8 0%, #f4c33b 60%, #c98a1c 100%);
    border-radius: 50% / 30%;
    box-shadow: 0 2px 0 rgba(0,0,0,.2);
  }
  .carpet::before, .carpet::after {
    content: '';
    position: absolute; bottom: 6px;
    width: 14%; height: 8px;
    background: repeating-linear-gradient(90deg, #fff7e6 0 4px, #c98a1c 4px 6px);
  }
  .carpet::before { left: 8%;  border-radius: 0 0 0 8px; }
  .carpet::after  { right: 8%; border-radius: 0 0 8px 0; }

  /* ── Bottom navigation ───────────────────────────────────── */
  .nav {
    position: relative; z-index: 2;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 18px 14px;
    background: linear-gradient(180deg, #b78a5e, #8e6537);
    border-top: 3px solid #5b4022;
    flex-shrink: 0;
  }
  .nav .btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 3px solid var(--brown);
    background: linear-gradient(180deg, #fff7e6, #f3e4c2);
    display: grid; place-items: center;
    box-shadow: 0 4px 0 rgba(0,0,0,.25);
    position: relative;
    font-size: 22px; color: var(--ink);
    cursor: pointer;
  }
  .nav .btn.center {
    width: 72px; height: 72px;
    background: radial-gradient(circle at 50% 35%, #fff0a8, #ffcd34 60%, #c98a1c);
    margin-top: -22px;
  }
  .nav .btn .badge {
    position: absolute; top: -4px; right: -4px;
    min-width: 22px; height: 22px;
    border-radius: 999px;
    background: var(--red);
    color: #fff;
    border: 2px solid #fff;
    box-shadow: 0 2px 0 rgba(0,0,0,.25);
    font-weight: 900; font-size: 12px;
    display: grid; place-items: center;
    padding: 0 6px;
  }
  .nav .btn.back {
    background: linear-gradient(180deg, #fff7e6, #f3e4c2);
  }
  .nav .btn.back .arrow {
    width: 26px; height: 14px;
    position: relative;
  }
  .nav .btn.back .arrow::before {
    content: '';
    position: absolute; left: 0; top: 50%;
    width: 22px; height: 4px;
    background: var(--red);
    border-radius: 2px;
    transform: translateY(-50%);
  }
  .nav .btn.back .arrow::after {
    content: '';
    position: absolute; left: -2px; top: 50%;
    width: 12px; height: 12px;
    border-left: 4px solid var(--red);
    border-bottom: 4px solid var(--red);
    transform: translateY(-50%) rotate(45deg);
  }

</style>
</head>
<body>

  <div class="phone" aria-label="Mergedom board shell">
    <div class="screen">
      <div class="room-bg"></div>

      <!-- Top HUD -->
      <div class="hud">
        <div class="pill energy"><span class="badge"></span>310<span class="plus">+</span></div>
        <div class="pill star"><span class="badge"></span>2</div>
        <div class="pill coin"><span class="badge"></span>1096<span class="plus">+</span></div>
        <button class="cog" aria-label="Settings">⚙</button>
      </div>

      <!-- Two empty orders -->
      <div class="avatars">
        <div class="order">
          <div class="npc bearded" aria-label="Customer"></div>
          <div class="order-slot" aria-label="Order item"></div>
          <div class="order-reward">+2</div>
        </div>
        <div class="order">
          <div class="npc boy-npc" aria-label="Customer"></div>
          <div class="order-slot" aria-label="Order item"></div>
          <div class="order-reward">+1</div>
        </div>
      </div>

      <!-- Info banner -->
      <div class="banner">
        <div class="info">
          <span>Tap to see information about an item.</span>
        </div>
      </div>

      <!-- Empty board -->
      <div class="board-wrap">
        <div class="board" id="board"></div>
      </div>

      <!-- Bottom nav -->
      <div class="nav">
        <button class="btn back" aria-label="Back">
          <span class="arrow"></span>
          <span class="badge">!</span>
        </button>
        <button class="btn" aria-label="Inventory">
          🎒
          <span class="badge" style="background:#fff;color:transparent;border-color:#fff">.</span>
        </button>
        <button class="btn center" aria-label="Home">
          🏠
          <span class="badge">3</span>
        </button>
        <button class="btn" aria-label="Shop">
          🏪
          <span class="badge">!</span>
        </button>
        <button class="btn" aria-label="Tasks">
          📋
          <span class="badge">1</span>
        </button>
      </div>
    </div>
  </div>

<script>
  // Render an empty 7×9 board (63 cells, no items).
  const board = document.getElementById('board');
  for (let i = 0; i < 63; i++) {
    const c = document.createElement('div');
    c.className = 'cell';
    board.appendChild(c);
  }
</script>
</body>
</html>
